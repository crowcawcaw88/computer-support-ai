<!DOCTYPE html>
<html>
<head>
    <title>Computer-Support-AI</title>
    <!-- Load Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #screen { width: 400px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.3); text-align: center; }
        .app-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
        .hidden { display: none; }
        #messages { height: 250px; overflow-y: auto; border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; display: flex; flex-direction: column; text-align: left; }
        .msg { margin: 5px 0; padding: 8px; border-radius: 8px; max-width: 85%; }
        .bot { background: #f1f0f0; align-self: flex-start; }
        .user { background: #3498db; color: white; align-self: flex-end; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="screen">
    <!-- Google reCAPTCHA Gatekeeper -->
    <div id="captcha-check">
        <h2>Verify you are human</h2>
        <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY_HERE"></div>
        <br>
        <button class="app-btn" style="background: #27ae60;" onclick="checkCaptcha()">Enter Support</button>
    </div>

    <div id="launcher" class="hidden">
        <h2>Computer-Support-AI 🐱🐶</h2>
        <button class="app-btn" style="background: #95a5a6;" onclick="loadAI('Chibs')">Chibs: General AI</button>
        <button class="app-btn" style="background: #3498db;" onclick="loadAI('Oliver')">Oliver: IT Expert</button>
    </div>

    <div id="chat-interface" class="hidden">
        <h2 id="chat-title"></h2>
        <div id="messages"></div>
        <input type="text" id="userInput" placeholder="Type here...">
        <button onclick="askAI()">Send</button>
        <button style="width:100%; margin-top:5px; background:#7f8c8d; border:none; padding:10px; color:white; cursor:pointer;" onclick="location.reload()">Back</button>
    </div>
</div>

<script>
    const API_KEY = "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"; 
    let currentPersona = "";
    let conversationHistory = [];

    async function checkCaptcha() {
        const token = grecaptcha.getResponse();
        if (!token) return alert("Please complete the reCAPTCHA! 🐾");

        const response = await fetch('/.netlify/functions/verify', {
            method: 'POST',
            body: JSON.stringify({ token: token })
        });
        const result = await response.json();

        if (result.success) {
            document.getElementById('captcha-check').classList.add('hidden');
            document.getElementById('launcher').classList.remove('hidden');
        } else {
            alert("Verification failed. Try again!");
        }
    }

    function loadAI(name) {
        currentPersona = name;
        document.getElementById('launcher').classList.add('hidden');
        document.getElementById('chat-interface').classList.remove('hidden');
        document.getElementById('chat-title').innerText = name + " Chat";
        const disclaimer = " (I am AI powered, so please verify info.)";
        const greeting = (name === "Oliver") ? "Oliver: Hello! Please provide device make and model." + disclaimer : "Chibs: Hey! I help with everything except electronics." + disclaimer;
        appendMessage(greeting, 'bot');
    }

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = 'msg ' + className;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
    
    // ... (Keep your original getAnswerFromAI and askAI logic here) ...
</script>
</body>
</html>
