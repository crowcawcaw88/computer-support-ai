<!DOCTYPE html>
<html>
<head>
    <title>My Secure Site 🐾</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

    <h1>Welcome to my site! 🐱</h1>
    
    <div class="g-recaptcha" data-sitekey="6LdT3h0tAAAAABFJS441bhcGpEeckL9HCMLhcVs7"></div>
    
    <button onclick="submitForm()">Submit</button>

    <script>
      // This function should be called by your Submit button
async function handleFormSubmit() {
    // 1. Get the token from the reCAPTCHA widget
    const token = grecaptcha.getResponse();

    // 2. Check if the token is empty (meaning they didn't do the captcha!)
    if (token.length === 0) {
        alert("Please complete the CAPTCHA first! 🐾");
        return;
    }

    // 3. Send that token to your verify.js function
    const response = await fetch('/.netlify/functions/verify', {
        method: 'POST',
        body: JSON.stringify({ token: token })
    });

    const result = await response.json();

    // 4. Tell the user what happened!
    if (result.success) {
        alert("Success! You're a human! 🐱");
    } else {
        alert("Robot detected! Try again. 🤖");
    }
}
        }
    </script>
</body>
</html>
