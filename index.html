<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Five Acres Computer Support</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #ffeb3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #main-container { background: #e1f5fe; padding: 30px; border-radius: 25px; border: 5px solid #03a9f4; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 80vw; height: 75vh; display: flex; gap: 20px; }
        .panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .chat-panel { flex: 2; display: flex; flex-direction: column; }
        button { background-color: #ff4081; color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; margin: 10px 0; font-weight: bold; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #03a9f4; width: 100%; box-sizing: border-box; }
        #chatHistory { flex-grow: 1; background: white; border: 2px solid #03a9f4; border-radius: 10px; padding: 15px; overflow-y: auto; text-align: left; font-size: 1.1em; }
        h1 { color: #f50057; text-align: center; }
    </style>
</head>
<body>

    <div id="main-container">
        <!-- CAPTCHA: data-type="image" hints at a puzzle -->
        <div class="panel" id="security-panel">
            <h1>Five Acres Support 🐱🏡</h1>
            <div class="g-recaptcha" data-sitekey="6LdT3h0tAAAAABFJS441bhcGpEeckL9HCMLhcVs7" data-type="image"></div>
            <button onclick="checkCaptcha()">Enter Support 🚀</button>
        </div>

        <div class="panel" id="assistant-panel" style="display: none;">
            <h3>Pick your assistant: 🤖</h3>
            <button onclick="selectAssistant('Oliver')">Oliver (Electronics) 💻</button>
            <button onclick="selectAssistant('Chibs')">Chibs (Other) 🎈</button>
        </div>

        <div class="chat-panel" id="chat-panel" style="display: none;">
            <div id="chatHistory"></div>
            <div style="margin-top: 10px;">
                <input type="text" id="userMessage" placeholder="Type your message here...">
                <button onclick="sendMessage()" style="width: 100%;">Send 💌</button>
            </div>
        </div>
    </div>

    <script>
        let currentAssistant = "";
        let conversationHistory = [];
        let isTransferring = false;

        function checkCaptcha() {
            const token = grecaptcha.getResponse();
            if (!token) { alert("Please complete the puzzle first! 🐾"); return; }
            document.getElementById("security-panel").style.display = "none";
            document.getElementById("assistant-panel").style.display = "flex";
        }

        function selectAssistant(name) {
            currentAssistant = name;
            document.getElementById("assistant-panel").style.display = "none";
            document.getElementById("chat-panel").style.display = "flex";
            const greeting = (name === 'Oliver' ? "Hello! I'm Oliver. What is your device's make, model, and issue?" : "Hello! I'm Chibs. How can I help you today?");
            document.getElementById("chatHistory").innerHTML = "<div><strong>" + name + ":</strong> " + greeting + "</div>";
        }

        async function sendMessage() {
            const input = document.getElementById("userMessage");
            const msg = input.value;
            if (!msg) return;

            document.getElementById("chatHistory").innerHTML += "<div><strong>You:</strong> " + msg + "</div>";
            conversationHistory.push("User: " + msg);
            input.value = "";

            const thinkingDiv = document.createElement("div");
            thinkingDiv.innerHTML = "<em>" + currentAssistant + " is thinking... 💭</em>";
            document.getElementById("chatHistory").appendChild(thinkingDiv);

            setTimeout(() => {
                thinkingDiv.remove();
                const lowerMsg = msg.toLowerCase();
                
                // Logic: Only respond if it's a specific request, otherwise be conversational
                let reply = "";
                if (lowerMsg.includes("broken") || lowerMsg.includes("issue")) {
                    reply = "I see. Please provide the exact model number so I can check my database for that specific " + currentAssistant + " issue.";
                } else if (lowerMsg.includes("chibs") || lowerMsg.includes("oliver")) {
                    isTransferring = true;
                    reply = "I cannot do that request here. Please add a bit more detail about your problem, and I will transfer you.";
                } else {
                    reply = "I'm ready to help. Please tell me more about what is happening with your device.";
                }
                
                document.getElementById("chatHistory").innerHTML += "<div><strong>" + currentAssistant + ":</strong> " + reply + "</div>";
            }, 2000);
        }
    </script>
</body>
</html>
