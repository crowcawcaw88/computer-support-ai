<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Five Acres Computer Support</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #ffeb3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #captcha-container, #chat-container { background: #e1f5fe; padding: 25px; border-radius: 25px; border: 5px solid #03a9f4; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        button { background-color: #ff4081; color: white; border: none; padding: 12px 24px; border-radius: 15px; cursor: pointer; margin: 8px; font-weight: bold; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #03a9f4; width: 80%; }
        #responseBox { margin-top: 20px; font-weight: bold; color: #d81b60; padding: 10px; }
        h1 { color: #f50057; }
    </style>
</head>
<body>

    <div id="captcha-container">
        <h1>Five Acres Computer Support 🐱🏡</h1>
        <h3>Verify you're human! 🧩</h3>
        <div class="g-recaptcha" data-sitekey="6LdT3h0tAAAAABFJS441bhcGpEeckL9HCMLhcVs7" data-size="invisible"></div>
        <button onclick="triggerCaptcha()">Enter Support 🚀</button>
    </div>

    <div id="chat-container" style="display: none;">
        <h3>Pick your assistant: 🤖</h3>
        <button onclick="selectAssistant('Oliver')">Oliver (Electronics) 💻</button>
        <button onclick="selectAssistant('Chibs')">Chibs (Everything else) 🎈</button>
        <div id="chat-area" style="display: none; margin-top: 20px;">
            <input type="text" id="userMessage" placeholder="Type here...">
            <button onclick="sendMessage()">Send 💌</button>
        </div>
        <div id="responseBox"></div>
    </div>

    <script>
        let currentAssistant = "";

        function triggerCaptcha() {
            grecaptcha.execute();
        }

        async function onCaptchaSolved(token) {
            const res = await fetch("/api/verify", { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({ token: token }) 
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById("captcha-container").style.display = "none";
                document.getElementById("chat-container").style.display = "block";
            } else { alert("Failed: " + data.reason); }
        }

        window.onload = function() {
            grecaptcha.render(document.querySelector('.g-recaptcha'), {
                'sitekey': '6LdT3h0tAAAAABFJS441bhcGpEeckL9HCMLhcVs7',
                'callback': onCaptchaSolved
            });
        };

        function selectAssistant(name) {
            currentAssistant = name;
            document.getElementById("chat-area").style.display = "block";
            const greeting = name === 'Oliver' ? 
                "Hello, I am your IT specialist, Oliver. To start, please say your devices make and model, and what is wrong. If you have any other questions not related to electronics, please ask for Chibs. (Disclaimer: I am run by AI and may be incorrect. Please email support@openrouter.ai for questions about how I work.)" :
                "Hello, I am chibs, your everyday AI assistant. One thing about me, I do everything except electronics. Never learned. If you need electronics help, please ask for Oliver. (Disclaimer: I am run by AI and may be incorrect. Please email support@openrouter.ai for questions about how I work.)";
            document.getElementById("responseBox").innerText = greeting;
        }

        async function sendMessage() {
            const msg = document.getElementById("userMessage").value;
            
            if ((currentAssistant === 'Oliver' && msg.toLowerCase().includes('chibs')) || 
                (currentAssistant === 'Chibs' && msg.toLowerCase().includes('oliver'))) {
                alert("Before I transfer you, please add more details about your issue.");
                return;
            }

            document.getElementById("responseBox").innerText = "Thinking... 💭";
            
            setTimeout(async () => {
                const res = await fetch("/api/chat", { 
                    method: "POST", 
                    headers: {"Content-Type": "application/json"}, 
                    body: JSON.stringify({ message: msg }) 
                });
                const data = await res.json();
                document.getElementById("responseBox").innerText = "Summarization: You said " + msg + ", correct? " + data.reply;
            }, 5000);
        }
    </script>
</body>
</html>
