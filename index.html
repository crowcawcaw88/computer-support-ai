<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Five Acres Computer Support</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #ffeb3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #captcha-container, #chat-container { background: #e1f5fe; padding: 25px; border-radius: 25px; border: 5px solid #03a9f4; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        button { background-color: #ff4081; color: white; border: none; padding: 12px 24px; border-radius: 15px; cursor: pointer; margin: 8px; font-weight: bold; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #03a9f4; width: 80%; }
        #chatHistory { height: 150px; overflow-y: auto; background: white; border: 2px solid #03a9f4; border-radius: 10px; margin-top: 15px; padding: 10px; text-align: left; font-size: 0.9em; }
        #responseBox { margin-top: 10px; font-weight: bold; color: #d81b60; padding: 10px; }
        h1 { color: #f50057; }
        .g-recaptcha { display: flex; justify-content: center; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="captcha-container">
        <h1>Five Acres Computer Support 🐱🏡</h1>
        <h3>Verify you're human! 🧩</h3>
        <div class="g-recaptcha" data-sitekey="6LdT3h0tAAAAABFJS441bhcGpEeckL9HCMLhcVs7"></div>
        <button onclick="checkCaptcha()">Enter Support 🚀</button>
    </div>

    <div id="chat-container" style="display: none;">
        <h3>Pick your assistant: 🤖</h3>
        <button onclick="selectAssistant('Oliver')">Oliver (Electronics) 💻</button>
        <button onclick="selectAssistant('Chibs')">Chibs (Everything else) 🎈</button>
        
        <div id="chat-area" style="display: none; margin-top: 20px;">
            <div id="chatHistory"></div>
            <input type="text" id="userMessage" placeholder="Type here..." style="margin-top: 10px;">
            <button onclick="sendMessage()">Send 💌</button>
        </div>
        <div id="responseBox"></div>
    </div>

    <script>
        let currentAssistant = "";
        let isTransferring = false;

        async function checkCaptcha() {
            const token = grecaptcha.getResponse();
            if (!token) { alert("Please click the checkbox first! 🐾"); return; }
            const res = await fetch("/api/verify", { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({ token: token }) 
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById("captcha-container").style.display = "none";
                document.getElementById("chat-container").style.display = "block";
            } else { alert("Verification failed!"); grecaptcha.reset(); }
        }

        function selectAssistant(name) {
            currentAssistant = name;
            document.getElementById("chat-area").style.display = "block";
            document.getElementById("chatHistory").innerHTML = "";
            const greeting = name === 'Oliver' ? 
                "Hello, I am your IT specialist, Oliver. To start, please say your devices make and model, and what is wrong." : 
                "Hello, I am chibs, your everyday AI assistant. I do everything except electronics!";
            document.getElementById("responseBox").innerText = greeting;
        }

        async function sendMessage() {
            const input = document.getElementById("userMessage");
            const msg = input.value;
            if (!msg) return;

            document.getElementById("chatHistory").innerHTML += "<div>You: " + msg + "</div>";
            input.value = "";

            if ((currentAssistant === 'Oliver' && msg.toLowerCase().includes('chibs')) || 
                (currentAssistant === 'Chibs' && msg.toLowerCase().includes('oliver'))) {
                alert("Before I transfer you, please add more details about your issue.");
                isTransferring = true;
                return;
            }

            document.getElementById("responseBox").innerText = "Thinking... 💭";
            
            setTimeout(async () => {
                const res = await fetch("/api/chat", { 
                    method: "POST", 
                    headers: {"Content-Type": "application/json"}, 
                    body: JSON.stringify({ message: msg, summarize: isTransferring }) 
                });
                const data = await res.json();
                
                let reply;
                if (isTransferring) {
                    const summaryText = data.summary || "your issue"; 
                    reply = "You said " + summaryText + ", correct?";
                } else {
                    reply = data.reply || "I'm sorry, I'm having a little trouble thinking right now. Could you rephrase that? 🐱";
                }
                
                document.getElementById("responseBox").innerText = reply;
                document.getElementById("chatHistory").innerHTML += "<div>" + currentAssistant + ": " + reply + "</div>";
                isTransferring = false;
            }, 5000);
        }
    </script>
</body>
</html>
